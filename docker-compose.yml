services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 — Primary persistent store
  # Tuned for 10K-20K concurrent app connections
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lynxus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lynxus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lynxus}
      POSTGRES_DB: ${POSTGRES_DB:-lynxus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      # Connection pool headroom for 10K-20K WS connections
      # Each WS connection does NOT hold a PG connection open;
      # the Go app uses pgxpool with a bounded pool (see config).
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      # WAL tuning for write-heavy chat workload
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lynxus}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7 — State, Pub/Sub, Matchmaking ZSET
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lynxus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      # Allow enough clients for 20K WS connections + overhead
      - "--maxclients"
      - "25000"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      # Pub/Sub output buffer: 64MB hard / 32MB soft (60s)
      - "--client-output-buffer-limit"
      - "pubsub 67108864 33554432 60"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # Coturn — STUN/TURN for WebRTC NAT traversal
  # ─────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: lynxus-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      # TURN relay port range
      - "49152-49200:49152-49200/udp"
    command:
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--min-port=49152"
      - "--max-port=49200"
      - "--realm=lynxus.local"
      - "--use-auth-secret"
      - "--static-auth-secret=${COTURN_SECRET:-coturn-static-auth-secret}"
      - "--fingerprint"
      - "--lt-cred-mech"
      - "--no-cli"
      - "--no-software-attribute"
      - "--log-file=stdout"
      - "--verbose"

  # ─────────────────────────────────────────────
  # Lynxus Go Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lynxus-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-lynxus}:${POSTGRES_PASSWORD:-lynxus}@postgres:5432/${POSTGRES_DB:-lynxus}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      SUPABASE_URL: "${SUPABASE_URL}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-sk_test_placeholder}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}"
      COTURN_SECRET: "${COTURN_SECRET:-coturn-static-auth-secret}"
      SERVER_PORT: "8080"
      # pgxpool settings — bounded pool, NOT 1:1 with WS connections
      DB_MAX_CONNS: "100"
      DB_MIN_CONNS: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      coturn:
        condition: service_started

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
